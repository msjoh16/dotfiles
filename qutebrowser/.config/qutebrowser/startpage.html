<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="startpage.css">
</head>
<body>
  <div class="wrapper">

    <div class="clock">
      <div class="clock-time" id="time">00:00</div>
      <div class="clock-date" id="date">—</div>
    </div>

    <div class="links">

      <!-- Google -->
      <a class="link" href="https://google.com">
        <span class="link-icon"></span>
        Google
      </a>

      <div class="rule"></div>

      <!-- YouTube -->
      <a class="link" href="https://youtube.com">
        <span class="link-icon"></span>
        YouTube
      </a>

      <div class="rule"></div>

      <!-- Claude -->
      <a class="link" href="https://claude.com">
        <span class="link-icon">󰧑</span>
        Claude
      </a>

      <div class="rule"></div>

      <!-- Proxmox -->
      <a class="link" href="https://10.0.0.2:8006">
        <span class="link-icon"></span>
        Proxmox
      </a>            

    </div>
  </div>

  <script>
    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      let h = now.getHours();
      const m = pad(now.getMinutes());
      const ampm = h >= 12 ? 'pm' : 'am';
      h = h % 12 || 12;

      document.getElementById('time').textContent = `${h}:${m}`;

      const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const d = now.getDate();
      document.getElementById('date').textContent =
        `${days[now.getDay()]}  ·  ${months[now.getMonth()]} ${d}`;
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
